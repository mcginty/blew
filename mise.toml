# blew development tasks
# Install mise: https://mise.jdx.dev
# Usage: mise run <task>   or   mise r <task>

[tools]
rust = { version = "stable", components = "rustfmt,clippy", targets = "aarch64-apple-ios,aarch64-linux-android" }
cargo-binstall = "latest"
"cargo:cargo-ndk" = "latest"
"cargo:cargo-deny" = "latest"
"cargo:cargo-nextest" = "latest"
ktlint = "latest"
"cargo:cargo-release" = "latest"

[tasks.build]
description = "Build all crates"
run = "cargo build"

[tasks.check]
description = "Type-check all crates (no codegen)"
run = "cargo check --workspace --all-targets"

[tasks.lint]
description = "Run clippy and ktlint on all code"
depends = ["fmt:check"]
run = "cargo clippy --workspace -- -D warnings"

[tasks."lint:fix"]
description = "Run clippy --fix and ktlint --format on all code"
depends = ["fmt"]
run = "cargo clippy --workspace --fix"

[tasks.test]
description = "Run all tests"
run = "cargo nextest run --workspace"

[tasks.fmt]
description = "Format all Rust and Kotlin code"
run = """
cargo fmt --all
ktlint --format 'crates/blew/android/**/*.kt'
"""

[tasks."fmt:check"]
description = "Check formatting without modifying files"
run = """
cargo fmt --all -- --check
ktlint 'crates/blew/android/**/*.kt'
"""

[tasks.deny]
description = "Check dependencies for license and vulnerability issues"
run = "cargo deny check"

[tasks.verify]
description = "Pre-commit gate: fmt + lint + test + deny"
depends = ["fmt", "lint", "test", "deny"]

# --- CI ---------------------------------------------------------------

[tasks.ci]
description = "Run all the checks that CI would run"
depends = ["lint", "fmt:check", "deny", "test"]

[tasks."ci:lint"]
description = "Run clippy on all crates"
run = "cargo clippy --workspace -- -D warnings"

[tasks."ci:check-ios"]
description = "Type-check for iOS"
run = "cargo check --target aarch64-apple-ios -p blew"

[tasks."ci:check-android"]
description = "Type-check for Android"
run = "cargo ndk -t arm64-v8a check -p blew"
